<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yazeed Shows</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #E50914, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    p { color: #94a3b8; margin-bottom: 24px; font-size: 1.1rem; }
    .btn {
      display: inline-block;
      padding: 16px 48px;
      border-radius: 12px;
      background: #E50914;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(229,9,20,0.35);
      margin-bottom: 12px;
    }
    .btn:hover { transform: scale(1.05); }
    .hint { font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <h1>Yazeed Shows</h1>
  <p>Filme, Serien & Anime kostenlos</p>
  <a class="btn" href="https://www.1shows.org">🍿 1Shows.org starten</a>
  <p class="hint">🌐 Oben rechts auf <strong style="color:#f43f5e">DE</strong> klicken für Deutsch</p>
  <p class="hint" style="margin-top:12px">💾 Gespeichert von der Downloader App</p>
</body>
</html>
